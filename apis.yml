- type: Features
  data:
  - name: Real-Time Market Data
    description: Streaming real-time prices, quotes, and market activity across global
      markets.
  - name: Reference Data
    description: Static and semi-static security attributes, corporate actions, and
      fundamentals.
  - name: Historical Data
    description: End-of-day and intraday historical pricing, volume, and analytics
      data.
  - name: Intraday Tick Data
    description: Tick-by-tick trade and quote data for detailed market microstructure
      analysis.
  - name: Bloomberg Query Language (BQL)
    description: Flexible query language for custom data requests with filtering and
      aggregation.
  - name: Data License
    description: Bulk enterprise data delivery via SFTP and SOAP for reference data,
      pricing, and analytics.
  - name: B-PIPE Data Distribution
    description: Managed high-performance data distribution with entitlement management
      for enterprise.
  - name: Intelligence Research
    description: Analyst research reports, industry analysis, and ESG insights from
      Bloomberg Intelligence.
  - name: Multi-Language SDKs
    description: Official SDKs for Python, Java, C++, C#/.NET, Node.js, and Perl.
  - name: Enterprise Authentication
    description: Authentication, authorization, and permissioning for enterprise data
      distribution.
- type: UseCases
  data:
  - name: Trading Systems
    description: Feed real-time market data into trading and execution management
      systems.
  - name: Risk Management
    description: Source pricing and reference data for portfolio risk calculations.
  - name: Quantitative Research
    description: Access historical data and BQL for quantitative analysis and backtesting.
  - name: Portfolio Analytics
    description: Retrieve security attributes and pricing for portfolio valuation
      and attribution.
  - name: Compliance and Reporting
    description: Source reference data for regulatory reporting and compliance.
  - name: Data Warehousing
    description: Bulk load financial data via Data License for enterprise data warehouses.
  - name: ESG Analysis
    description: Access Bloomberg Intelligence ESG scores and research for sustainable
      investing.
  - name: Credit Research
    description: Access credit analysis, ratings data, and fixed income research.
- type: Solutions
  data:
  - name: Bloomberg Terminal
    description: Professional terminal with integrated BLPAPI for desktop application
      development.
  - name: Bloomberg Enterprise
    description: Server API and B-PIPE for enterprise-wide data distribution.
  - name: Bloomberg Data License
    description: Bulk data delivery platform for enterprise data management.
  - name: Bloomberg Intelligence
    description: Research and analysis platform with proprietary data and expert insights.
